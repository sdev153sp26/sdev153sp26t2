<div id = "reshero"></div>
<main>
 <h2>Reservations at Pacific Trails</h2>
 <h3>Contact Us</h3>
 <p>Required fields are marked with an asterisk*</p>
 <form method="post" action="https://webdevbasics.net/scripts/pacific.php">
  <label for="myFName">*First Name:</label>
  <input type="text" name="myFName" id="myFName" required>
  <label for="myLName">*Last Name:</label>
  <input type="text" name="myLName" id="myLName" required>
  <label for="myAddress">*Street Address:</label>
  <input type="text" name="myAddress" id="myAddress" required>
  <label for="myCity">*City:</label>
  <input type="text" name="myCity" id="myCity" required>
  <label for="myState">*State:</label>
  <input type="text" name="myState" id="myState" minlength="2" maxlength="2" required>
  <label for="myZip">*Zip Code:</label>
  <input type="text" name="myZip" id="myZip" minlength="5" maxlength="5" required>
  <label for="myEmail">*E-mail:</label>
  <input type="text" name="myEmail" id="myEmail" required>
  <label for="myPhone">*Phone:</label>
  <input type="text" name="myPhone" id="myPhone" minlength="10" maxlength="10" required>
  <label for="myDate">Arrival Date</label>
  <input type="date" name="myDate" id="myDate"> 
  <label for="myNights">Nights from 1 to 14:</label>
  <input type="number" name="myNights" id="myNights" min="1" max="14"> 
  <label for="myComments">Comments:</label>
  <textarea name="myComments" id="myComments" rows="2" cols="20"></textarea>
  <input type="submit" id="mySubmit" value="Submit">
</form>
</main>
